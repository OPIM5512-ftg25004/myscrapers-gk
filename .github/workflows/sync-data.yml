name: Data Sync Daily Predictions to Repo
run-name: Syncing daily predictions for ${{ github.ref_name }} by @${{ github.actor }} 

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '45 * * * *' # Every hour at 45 minutes past the hour
  workflow_dispatch: 

permissions:
  contents: write 
  id-token: write 

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_PREDS_PREFIX: "structured/preds" 
  OUTPUT_DIR: "results" 

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth (WIF) and Setup gcloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
      
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Sync 14-Digit Run Folders from GCS
        id: sync_rsync
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ${{ env.OUTPUT_DIR }} 
          
          # This specifically matches any folder name containing 14 digits
          gsutil -m rsync -r -x '^(?!.*[0-9]{14})' gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/ ${{ env.OUTPUT_DIR }}/
          
          echo "Successfully synced all 14-digit RUN_ID folders to ${{ env.OUTPUT_DIR }}"

      - name: Commit and Push All Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add ${{ env.OUTPUT_DIR }}
          
          if git diff --staged --quiet; then
            echo "No new data detected. Skipping commit."
          else
            git commit -m "🤖 Data Sync: Update historical predictions and artifacts"
            git pull --rebase origin main 
            git push
          fi
