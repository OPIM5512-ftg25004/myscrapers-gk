name: Train Model and Sync Artifacts
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Trigger Training Function
        run: |
          RESPONSE=$(curl -s -X POST https://train-dt-jbs7rqqlqq-uc.a.run.app \
          -H "Content-Type: application/json" \
          -d '{"dry_run": false}')
          echo "Function Response: $RESPONSE"
          # This forces the action to fail if the function returned an error
          if [[ "$RESPONSE" == *"error"* ]]; then exit 1; fi
          
      - name: Wait for Cloud Function
        run: sleep 60 # Essential: gives Optuna time to finish and write files

      - name: Download Artifacts from GCS
        run: |
          mkdir -p ./artifacts/
          # No more $DATE or wildcards needed!
          gcloud storage cp gs://${{ secrets.GCS_BUCKET }}/structured/preds/preds.csv ./artifacts/
          gcloud storage cp gs://${{ secrets.GCS_BUCKET }}/structured/preds/importance.csv ./artifacts/
          gcloud storage cp gs://${{ secrets.GCS_BUCKET }}/structured/preds/pdp_plots.png ./artifacts/

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add artifacts/
          git commit -m "Automated model artifacts for $(date +'%Y-%m-%d')" || exit 0
          git push
